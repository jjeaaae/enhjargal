<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecipeHub - Жор нэмэх</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="add.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div>
        <p class="eyebrow">Жорын апп</p>
        <h1 class="logo">RecipeHub</h1>
      </div>
      <nav class="site-nav" aria-label="Үндсэн цэс">
        <a href="index.html">Нүүр хуудас</a>
        <a href="search.html">Хайх</a>
        <!-- <a href="detail.html">Жорын дэлгэрэнгүй</a> -->
        <a href="favorites.html">Хадгалсан</a>
        <a href="pricing.html">Subscription</a>
        <a class="active" href="add.html">Жор нэмэх</a>
        <a href="admin.html">Админ</a>
        <a class="auth-link" href="login.html">Нэвтрэх</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <section class="hero">
      <div class="container">
        <p class="eyebrow">Шинэ контент илгээх</p>
        <h2>Жор нэмэх</h2>
        <p class="section-intro">Энэ формд гарчиг, зураг, ангилал, орц, алхам, хугацаа, порц зэрэг шаардлагатай талбарууд орсон.</p>
      </div>
    </section>

    <section class="page-section">
      <div class="container">
        <form class="panel form-panel">
          <div class="panel-heading">
            <p class="card-tag">Жорын форм</p>
            <h3>Шинэ жор оруулах</h3>
          </div>
          <label for="recipe-name">Жорын нэр</label>
          <input id="recipe-name" type="text" placeholder="Жорын нэр">

          <label for="category">Ангилал</label>
          <select id="category">
            <option>Өглөөний хоол</option>
            <option>Өдрийн хоол</option>
            <option>Оройн хоол</option>
            <option>Амттан</option>
          </select>

          <label for="image-link">Зургийн холбоос</label>
          <input id="image-link" type="text" placeholder="Сонголттой">

          <label for="cook-time">Хоол хийх хугацаа</label>
          <input id="cook-time" type="text" placeholder="35 минут">

          <label for="servings">Порц</label>
          <input id="servings" type="text" placeholder="4">

          <label for="ingredients">Орц</label>
          <textarea id="ingredients" placeholder="Орцоо энд бичнэ үү"></textarea>

          <label for="steps">Алхам</label>
          <textarea id="steps" placeholder="Хийх алхмаа энд бичнэ үү"></textarea>

          <button class="card-button" type="submit">Жор нийтлэх</button>
        </form>
      </div>
    </section>
  </main>

</body>
</html>
